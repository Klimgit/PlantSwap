server:
  port: 8084

spring:
  application:
    name: chat-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/chat_db}
    username: ${SPRING_DATASOURCE_USERNAME:chat}
    password: ${SPRING_DATASOURCE_PASSWORD:chat}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# gRPC-клиент для deals-service
grpc:
  client:
    deals-service:
      address: ${GRPC_DEALS_ADDRESS:static://localhost:9090}
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  config: classpath:logback-spring.xml
